<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel</title>

<style>
body{margin:0;font-family:Arial;background:#f0f0f1}
.login{height:100vh;display:flex;justify-content:center;align-items:center}
.card{background:#fff;padding:20px;border:1px solid #ccc;width:300px}
input{width:100%;padding:10px;margin-bottom:10px}
button{padding:10px;width:100%;background:#0073aa;color:#fff;border:none;cursor:pointer}
.painel{display:none;padding:20px}
</style>
</head>

<body>

<div class="login" id="login">
    <div class="card">
        <img src="img/logo.png" style="width:100%;margin-bottom:15px">

        <input id="user" placeholder="Usuário">
        <input id="pass" type="password" placeholder="Senha">

        <button onclick="logar()">Entrar</button>
    </div>
</div>

<div class="painel" id="painel">
    <h2>Painel</h2>

    <input type="file" onchange="salvarBanner(this)">
    <button onclick="limparBanner()">Limpar Banner</button>

    <br><br>

    <textarea id="mapa" placeholder="Cole iframe do mapa"></textarea>
    <button onclick="salvarMapa()">Salvar mapa</button>

    <br><br>
    <button onclick="logout()">Sair</button>
</div>

<script>
function logar(){
    let u = document.getElementById('user').value
    let p = document.getElementById('pass').value

    if(u=="master" && p=="1012"){
        document.getElementById('login').style.display="none"
        document.getElementById('painel').style.display="block"
    }else{
        alert("Login inválido")
    }
}

function salvarBanner(input){
    let reader = new FileReader()
    reader.onload = function(e){
        localStorage.setItem('db_banners_rotativos', JSON.stringify([e.target.result]))
        alert("Banner salvo")
    }
    reader.readAsDataURL(input.files[0])
}

function limparBanner(){
    localStorage.removeItem('db_banners_rotativos')
    alert("Removido")
}

function salvarMapa(){
    localStorage.setItem('db_mapa_url', document.getElementById('mapa').value)
    alert("Mapa salvo")
}

function logout(){
    location.reload()
}
</script>

</body>
</html>
