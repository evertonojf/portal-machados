<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Oficial</title>

<link rel="icon" href="img/icon.png">

<style>
body{margin:0;font-family:Arial;background:#f1f5f9}
.header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#fff}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:60px}

.banner{height:300px;background:#ddd;display:flex;align-items:center;justify-content:center}
.footer{background:#111;color:#fff;padding:20px;text-align:center;margin-top:30px}
</style>
</head>

<body>

<div class="header">
    <div class="logo">
        <img src="img/logo.png">
        <strong>Prefeitura</strong>
    </div>
</div>

<div class="banner" id="banner"></div>

<div class="footer">
    <p>Prefeitura Municipal</p>

    <a href="#" target="_blank">
        <img src="img/insta.png" style="width:25px;filter:invert(1);">
    </a>
</div>

<script>
function carregarBanner(){
    let lista = JSON.parse(localStorage.getItem('db_banners_rotativos')) || []
    if(lista.length>0){
        document.getElementById('banner').style.backgroundImage = `url(${lista[0]})`
        document.getElementById('banner').style.backgroundSize = "cover"
    }
}

window.onload = carregarBanner
</script>

</body>
</html>
